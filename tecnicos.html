<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Equipos - Técnicos (DCyT)</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body class="bg-light">

    <div class="container my-5" style="max-width: 1000px;">
        
        <div class="d-flex flex-wrap justify-content-between align-items-center mb-4 bg-white p-4 rounded shadow-sm border-start border-primary border-4">
            <div class="d-flex align-items-center gap-3">
                <div class="bg-primary-subtle text-primary p-2 rounded-3 d-flex align-items-center justify-content-center" style="width: 45px; height: 45px;">
                    <svg xmlns="http://www.w3.org/2000/svg" width="30" height="30" fill="currentColor" class="bi bi-pc-display" viewBox="0 0 16 16">  
                        <path d="M8 1a1 1 0 0 1 1-1h6a1 1 0 0 1 1 1v14a1 1 0 0 1-1 1H9a1 1 0 0 1-1-1zm1 13.5a.5.5 0 1 0 1 0 .5.5 0 0 0-1 0m2 0a.5.5 0 1 0 1 0 .5.5 0 0 0-1 0M9.5 1a.5.5 0 0 0 0 1h5a.5.5 0 0 0 0-1zM9 3.5a.5.5 0 0 0 .5.5h5a.5.5 0 0 0 0-1h-5a.5.5 0 0 0-.5.5M1.5 2A1.5 1.5 0 0 0 0 3.5v7A1.5 1.5 0 0 0 1.5 12H6v2h-.5a.5.5 0 0 0 0 1H7v-4H1.5a.5.5 0 0 1-.5-.5v-7a.5.5 0 0 1 .5-.5H7V2z"/>
                    </svg>
                </div>
                <div>
                    <h1 class="h3 mb-0 text-dark fw-bold">Gestión de Equipos</h1>
                    <small class="text-muted fw-semibold text-uppercase tracking-wider" style="font-size: 11px;">Panel Técnico — DCyT UCLA</small>
                </div>
            </div>
            <span class="badge bg-dark text-warning px-3 py-2 rounded-pill font-monospace small">v2.1.0</span>
        </div>
         <div id="panelEstadisticas" class="alert alert-danger shadow-sm border-0 d-flex align-items-center gap-2 mb-4" role="alert">
            <i class="bi bi-graph-up-arrow fs-5"></i>
            <div>
                <strong>Reporte Operativo del Laboratorio:</strong> 
                <span id="lblPorcentajeMantenimiento" class="ms-1">Calculando indicadores...</span>
            </div>
        </div>


        <div class="card shadow-sm mb-4 border-0">
            <div class="card-body p-4">
                <div class="d-flex flex-wrap justify-content-between align-items-center gap-3">
                    <h5 class="card-title mb-0 text-secondary fw-semibold d-flex align-items-center gap-2">
                        <i class="bi bi-lightning-charge-fill text-warning"></i> Acciones Rápidas
                    </h5>
                    <button id="btToggleFormulario" class="btn btn-primary btn-sm d-flex align-items-center gap-1 shadow-sm fw-medium">
                        <i class="bi bi-plus-circle"></i> Registrar Nuevo Equipo
                    </button>
                </div>
                <hr class="text-muted opacity-25 my-3">
                
                <div class="row g-3 align-items-center">
                    <div class="col-12 col-md-auto d-flex align-items-center gap-2">
                        <label for="inIdEquipo" class="form-label mb-0 fw-bold text-secondary small text-uppercase">ID Equipo:</label>
                        <input type="text" id="inIdEquipo" class="form-control form-control-sm text-center fw-bold border-secondary-subtle" placeholder="Ej: 1" style="width: 75px; height: 31px;">
                    </div>
                    <div class="col-12 col-md-auto d-flex gap-2">
                        <button id="btMantenimiento" class="btn btn-outline-danger btn-sm d-flex align-items-center gap-2 fw-medium px-3">
                            <i class="bi bi-cone-striped text-danger"></i> Forzar Mantenimiento
                        </button>
                        <button id="btResolver" class="btn btn-outline-success btn-sm d-flex align-items-center gap-2 fw-medium px-3">
                            <i class="bi bi-check-circle-fill"></i> Forzar Activación
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <div id="panelFormularioAgregar" class="card shadow-sm mb-4 border-0 bg-white" style="display: none;">
            <div class="card-header bg-success text-white py-3">
                <h5 class="card-title mb-0 h6 d-flex align-items-center gap-2">
                    <i class="bi bi-pencil-square"></i> Registro de Nueva Máquina
                </h5>
            </div>
            <div class="card-body p-4">
                <form id="formularioEquipo" class="row g-3">
                    <div class="col-md-6 col-lg-3">
                        <label class="form-label small fw-medium">Marca</label>
                        <input type="text" id="addMarca" class="form-control form-control-sm" placeholder="Marca (Ej: Dell)" required>
                    </div>
                    <div class="col-md-6 col-lg-3">
                        <label class="form-label small fw-medium">Procesador</label>
                        <input type="text" id="addProcesador" class="form-control form-control-sm" placeholder="Procesador (Ej: i5)" required>
                    </div>
                    <div class="col-md-6 col-lg-2">
                        <label class="form-label small fw-medium">RAM (GB)</label>
                        <input type="number" id="addMemoria" class="form-control form-control-sm" placeholder="RAM GB (Ej: 8)" required>
                    </div>
                    <div class="col-md-6 col-lg-4">
                        <label class="form-label small fw-medium">Laboratorio</label>
                        <input type="text" id="addUbicacion" class="form-control form-control-sm" placeholder="Laboratorio (Ej: 1)" required>
                    </div>
                    <div class="col-md-4 col-lg-3">
                        <label class="form-label small fw-medium">Mesón</label>
                        <input type="text" id="addMeson" class="form-control form-control-sm" placeholder="Mesón (Ej: 3)" required>
                    </div>
                    <div class="col-md-4 col-lg-3">
                        <label class="form-label small fw-medium">Puesto</label>
                        <input type="text" id="addPuesto" class="form-control form-control-sm" placeholder="Puesto (Ej: 2)" required>
                    </div>
                    <div class="col-md-4 col-lg-6">
                        <label class="form-label small fw-medium">Observaciones Iniciales</label>
                        <input type="text" id="addObservaciones" class="form-control form-control-sm" placeholder="Observaciones iniciales (Opcional)">
                    </div>
                    
                    <div class="col-12 text-end mt-4">
                        <button type="button" id="btCancelarRegistro" class="btn btn-light btn-sm me-2">Cancelar</button>
                        <button type="submit" class="btn btn-success btn-sm">
                            <i class="bi bi-floppy"></i> Guardar en MockAPI
                        </button>
                    </div>
                </form>
            </div>
        </div>

       
        <div class="card shadow-sm border-0 rounded-3">
            <div class="card-body p-4">
                <h5 class="mb-4 text-secondary fw-semibold">Equipos en Laboratorio</h5>
                
                <div class="row g-3 bg-light p-3 rounded border mb-4 align-items-center">
                    <div class="col-12 col-md-auto">
                        <span class="fw-bold text-dark small text-nowrap"><i class="bi bi-search"></i> Filtrar por:</span>
                    </div>
                    
                    <div class="col-6 col-sm-4 col-md-2">
                        <label class="form-label small mb-1 text-muted d-flex align-items-center gap-1">
                            <i class="bi bi-grid-3x3-gap-fill text-secondary" style="font-size: 13px;"></i>
                            Laboratorio
                        </label>
                        <select id="filtroUbicacion" class="form-select form-select-sm">
                            <option value="todos">Todos</option>
                            <option value="1">Lab 1</option>
                            <option value="2">Lab 2</option>
                            <option value="3">Lab 3</option>
                            <option value="4">Lab 4</option>
                            <option value="5">Lab 5</option>
                            <option value="6">Lab 6</option>
                        </select>
                    </div>

                    <div class="col-6 col-sm-4 col-md-2">
                        <label class="form-label small mb-1 text-muted d-flex align-items-center gap-1">
                            <i class="bi bi-cpu-fill text-secondary" style="font-size: 13px;"></i>
                            Procesador
                        </label>
                        <select id="filtroProcesador" class="form-select form-select-sm">
                            <option value="todos">Todos</option>
                            <option value="i3">i3</option>
                            <option value="i5">i5</option>
                            <option value="i7">i7</option>
                            <option value="Ryzen 5">Ryzen 5</option>
                        </select>
                    </div>

                    <div class="col-6 col-sm-4 col-md-2">
                        <label class="form-label small mb-1 text-muted d-flex align-items-center gap-1">
                            <i class="bi bi-memory text-secondary" style="font-size: 13px;"></i>
                            Memoria
                        </label>
                        <select id="filtroMemoria" class="form-select form-select-sm">
                            <option value="todos">Todos</option>
                            <option value="1">1 GB</option>
                            <option value="2">2 GB</option>
                            <option value="4">4 GB</option>
                            <option value="8">8 GB</option>
                            <option value="16">16 GB</option>
                        </select>
                    </div>

                    <div class="col-6 col-sm-4 col-md-3">
                        <label class="form-label small mb-1 text-muted d-flex align-items-center gap-1">
                            <i class="bi bi-circle-square text-secondary" style="font-size: 13px;"></i>
                            Estado
                        </label>
                        <select id="filtroEstado" class="form-select form-select-sm">
                            <option value="todos">Todos</option>
                            <option value="Activo">Activo</option>
                            <option value="Reportado">Reportado</option>
                            <option value="Mantenimiento">Mantenimiento</option>
                        </select>
                    </div>
                </div>

                <div class="table-responsive">
                    <table class="table table-hover align-middle border-light mb-0">
                        <thead class="table-dark small text-uppercase">
                            <tr>
                                <th scope="col" class="py-3">ID</th>
                                <th scope="col" class="py-3">Marca</th>
                                <th scope="col" class="py-3">Procesador</th>
                                <th scope="col" class="py-3">Memoria</th>
                                <th scope="col" class="py-3">Laboratorio</th>
                                <th scope="col" class="py-3">Mesón</th>       
                                <th scope="col" class="py-3">Puesto</th>      
                                <th scope="col" class="py-3">Observaciones</th>
                                <th scope="col" class="py-3">Estado</th>
                            </tr>
                        </thead>
                        <tbody id="tablaCuerpoEquipos" class="small"></tbody>
                    </table>
                </div>

            </div>
        </div>

    </div>

    <template id="plantillaEquipos">
        <tr>
            <td class="id-equipo fw-bold text-secondary"></td>
            <td class="marca-equipo fw-semibold"></td>
            <td class="procesador-equipo"></td>
            <td class="memoria-equipo"></td>
            <td class="ubicacion-equipo text-center"></td>
            <td class="meson-equipo text-center"></td>
            <td class="puesto-equipo text-center"></td>
            <td class="observacion-equipo celda-observacion text-muted fst-italic"></td>
            <td>
                <span class="estado-equipo badge rounded-pill bg-secondary px-2 py-1"></span>
            </td>
        </tr>
    </template>

    <style>
        .observacion-equipo:empty::before {
            content: "Sin observaciones";
            color: #888; 
            font-style: italic;
        }

        /* activo */
        .badge.bg-success, 
        .estado-equipo-activo,
        [class*="bg-success"] { 
            background-color: #188752 !important; 
            color: rgb(255, 255, 255) !important;
        }

        /* mantenimiento */
        .badge.bg-warning, 
        .estado-equipo-mantenimiento,
        [class*="bg-warning"] { 
            background-color: #ffe69c !important; 
            color: #664d03 !important;
        }

        /* reportado*/
        .badge.bg-danger, 
        .estado-equipo-reportado,
        [class*="bg-danger"] { 
            background-color: #f8d7da !important; 
            color: #842029 !important;
        }
    </style>

    <script type="module" src="./dist/principal.js"></script>
</body>
</html>
