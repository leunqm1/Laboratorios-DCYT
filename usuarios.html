<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gestión de Laboratorios - Estudiante</title>
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

  <link rel="stylesheet" href="./style.css"/>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet" />

  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='80' font-size='80'>💻</text></svg>" />

  <style>
    /* ✨ ESTILOS PARA LOS BADGES DE LAS TARJETAS */
    .badge-activo {
        background-color: #188752 !important;
        color: white !important;
    }
    .badge-mantenimiento {
        background-color: #ffe69c !important;
        color: #664d03 !important;
    }
    .badge-fallando {
        background-color: #f8d7da !important;
        color: #842029 !important;
    }
  </style>
</head>

<body class="bg-light">

  <main id="vista-general" class="container my-5" style="max-width: 800px;">
    
    <div class="bg-white p-4 rounded shadow-sm mb-4 border-start border-primary border-4 text-center">
      <h3 class="mb-1 text-dark fw-bold">🖥️ Laboratorios DCyT</h3>
      <small class="text-muted">Selecciona tu laboratorio y reporta cualquier falla técnica al instante.</small>
    </div>

    <div class="card shadow-sm mb-4">
      <div class="card-body p-4 bg-white">
        <h5 class="card-title text-secondary mb-3 d-flex align-items-center gap-2">
          <i class="bi bi-search"></i> Filtros de Búsqueda
        </h5>
        <div class="row g-3">
          
          <div class="col-md-4">
            <label class="form-label text-muted small fw-bold">Procesador:</label>
            <select id="filtroProcesadorUser" class="form-select">
              <option value="todos">Todos los Procesadores</option>
              <option value="i3">i3</option>
              <option value="i5">i5</option>
              <option value="i7">i7</option>
            </select>
          </div>

          <div class="col-md-4">
            <label class="form-label text-muted small fw-bold">Memoria RAM:</label>
            <select id="filtroMemoriaUser" class="form-select">
              <option value="todos">Todas las Memorias</option>
              <option value="1">1 GB</option>
              <option value="2">2 GB</option>
              <option value="4">4 GB</option>
              <option value="8">8 GB</option>
              <option value="16">16 GB</option>
            </select>
          </div>

          <div class="col-md-4">
            <label class="form-label text-muted small fw-bold">Laboratorio:</label>
            <select id="filtroUbicacionUser" class="form-select">
              <option value="todos">Todos los Laboratorios</option>
              <option value="1">Lab 1</option>
              <option value="2">Lab 2</option>
              <option value="3">Lab 3</option>
              <option value="4">Lab 4</option>
              <option value="5">Lab 5</option>
              <option value="6">Lab 6</option>
            </select>
          </div>

        </div>
      </div>
    </div>

    <section class="mb-5">
      <h4 class="text-secondary mb-3 d-flex align-items-center gap-2">
        <i class="bi bi-pc-display-horizontal"></i> Equipos Disponibles
      </h4>
      
      <div id="tablaCuerpoUser" class="row g-3"></div>
    </section>

  </main>

  <div id="modal-reporte" class="position-fixed top-50 start-50 translate-middle p-4 bg-white border rounded shadow d-none" style="z-index: 1050; width: 350px;">
    <h4 class="text-danger mb-3 fw-bold"><i class="bi bi-exclamation-triangle"></i> Reportar Falla</h4>
    
    <div class="mb-3">
      <p class="mb-1 text-muted small fw-bold">Equipo a reportar (ID):</p>
      <input type="text" id="idEquipoUsuario" class="form-control bg-light fw-bold text-center" readonly style="border: 1px solid #ccc;">
    </div>

    <div class="mb-3">
      <label class="form-label text-muted small fw-bold">Observación del daño:</label>
      <textarea id="inp-descripcion-reporte" class="form-control" rows="3" placeholder="Ej: No da video / Teclado dañado..."></textarea>
    </div>

    <div class="d-flex gap-2">
      <button id="btn-cancelar-reporte" class="btn btn-outline-secondary w-50" onclick="document.getElementById('modal-reporte').classList.add('d-none')">Cancelar</button>
      <button id="btReportarFalla" class="btn btn-danger w-50 fw-semibold">Enviar</button>
    </div>
  </div>

  <template id="plantillaEquipos">
    <div class="col-12 col-md-6 col-lg-4">
      <div class="card h-100 shadow-sm border-0 position-relative">
        <div class="card-body d-flex flex-column justify-content-between p-3">
          <div>
            <div class="d-flex justify-content-between align-items-start mb-2">
              <h6 class="card-title fw-bold text-dark mb-0 marca-equipo">Dell</h6>
              <span class="estado-equipo badge small">Disponible</span>
            </div>
            <p class="card-text text-muted mb-1 small">
              <span class="fw-bold text-secondary">Procesador:</span> <span class="procesador-equipo">i5</span> | 
              <span class="fw-bold text-secondary">RAM:</span> <span class="memoria-equipo">8 GB</span>
            </p>
            <p class="card-text text-muted mb-2 small">
              <span class="fw-bold text-secondary">Ubicación:</span> Lab <span class="ubicacion-equipo">1</span>, Mesón <span class="meson-equipo">2</span>, Puesto <span class="puesto-equipo">3</span>
            </p>
          </div>
          <button class="btn btn-outline-danger btn-sm w-100 mt-2 btn-abrir-reporte fw-semibold">
            ⚠️ Reportar Falla
          </button>
        </div>
      </div>
    </div>
  </template>

  <script type="module" src="./dist/principal_usuarios.js"></script>

</body>
</html>
